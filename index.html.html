<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Automatizaciones Simples — automatización para pymes</title>
  <meta name="description" content="Automatizamos los procesos repetitivos de tu pyme para que tus colaboradores dediquen su tiempo a lo que realmente importa."/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
/* ───────────────────────────────────────────────────────────────
   AUTOMATIZACIONES SIMPLES — Landing
   Minimalismo futurista · grids técnicos · blueprint
   ─────────────────────────────────────────────────────────────── */

:root {
  --bg: #fafaf7;
  --bg-2: #f3f2ed;
  --fg: #0f0f0e;
  --fg-2: #5a5a55;
  --fg-3: #8a8a83;
  --line: rgba(15, 15, 14, 0.12);
  --line-2: rgba(15, 15, 14, 0.06);
  --accent: #0f0f0e;
  --serif: "Instrument Serif", "Times New Roman", serif;
  --sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

[data-theme="dark"] {
  --bg: #0a0a09;
  --bg-2: #131311;
  --fg: #f4f3ee;
  --fg-2: #9a988f;
  --fg-3: #6a6862;
  --line: rgba(244, 243, 238, 0.14);
  --line-2: rgba(244, 243, 238, 0.06);
  --accent: #f4f3ee;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  transition: background .4s ease, color .4s ease;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }
input, textarea { font: inherit; color: inherit; }

/* Background grid — blueprint feel */
.bg-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(to right, var(--line-2) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line-2) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 90%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 90%);
}

/* Layout */
.container {
  width: 100%;
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  position: relative;
  z-index: 1;
}

@media (max-width: 720px) {
  .container { padding: 0 20px; }
}

/* Nav */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  background: color-mix(in oklab, var(--bg) 78%, transparent);
  border-bottom: 1px solid var(--line);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.brand-mark {
  width: 26px;
  height: 26px;
  border: 1px solid var(--fg);
  position: relative;
  display: grid;
  place-items: center;
}
.brand-mark::before, .brand-mark::after {
  content: "";
  position: absolute;
  background: var(--fg);
}
.brand-mark::before { width: 1px; height: 100%; }
.brand-mark::after  { width: 100%; height: 1px; }
.brand-mark span {
  width: 6px; height: 6px;
  background: var(--bg);
  border: 1px solid var(--fg);
  z-index: 1;
  border-radius: 50%;
}

.nav-links {
  display: flex;
  gap: 28px;
  font-size: 13.5px;
  color: var(--fg-2);
}
.nav-links a:hover { color: var(--fg); }

@media (max-width: 720px) {
  .nav-links { display: none; }
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border: 1px solid var(--fg);
  background: var(--fg);
  color: var(--bg);
  font-size: 13px;
  font-weight: 500;
  border-radius: 999px;
  transition: transform .2s ease, opacity .2s ease;
}
.nav-cta:hover { transform: translateY(-1px); opacity: 0.9; }
.nav-cta .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 8px #4ade80;
}

/* Hero common */
.hero {
  position: relative;
  padding: 80px 0 100px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-2);
}
.eyebrow::before {
  content: "";
  width: 24px; height: 1px; background: var(--fg-2);
}

.hero h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(48px, 8vw, 112px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin-top: 28px;
  text-wrap: balance;
}
.hero h1 em {
  font-style: italic;
  color: var(--fg-2);
}

.hero p.lead {
  margin-top: 28px;
  max-width: 560px;
  font-size: 17px;
  line-height: 1.55;
  color: var(--fg-2);
  text-wrap: pretty;
}

.cta-row {
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  background: var(--fg);
  color: var(--bg);
  font-size: 14px;
  font-weight: 500;
  border-radius: 999px;
  transition: transform .2s ease, opacity .2s ease;
}
.btn-primary:hover { transform: translateY(-1px); opacity: 0.92; }
.btn-primary svg { transition: transform .2s ease; }
.btn-primary:hover svg { transform: translateX(3px); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 13px 20px;
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 14px;
  color: var(--fg-2);
  transition: border-color .2s, color .2s;
}
.btn-ghost:hover { border-color: var(--fg); color: var(--fg); }

/* Hero meta strip */
.meta-strip {
  margin-top: 64px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.meta-strip > div {
  padding: 22px 24px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.meta-strip > div:last-child { border-right: none; }
.meta-strip .num {
  font-family: var(--serif);
  font-size: 36px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.meta-strip .lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-3);
}

@media (max-width: 720px) {
  .meta-strip { grid-template-columns: repeat(2, 1fr); }
  .meta-strip > div:nth-child(2) { border-right: none; }
  .meta-strip > div:nth-child(1), .meta-strip > div:nth-child(2) {
    border-bottom: 1px solid var(--line);
  }
}

/* Hero variants */
.hero-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 80px;
  align-items: center;
}
@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr; gap: 48px; }
}

/* Logos band */
.logos {
  padding: 56px 0;
  border-bottom: 1px solid var(--line);
}
.logos-label {
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-3);
  margin-bottom: 32px;
}
.logos-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  align-items: center;
  gap: 32px 64px;
}
.logo-item {
  font-family: var(--serif);
  font-size: 24px;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  opacity: 0.7;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.logo-item .glyph {
  width: 14px; height: 14px;
  display: inline-block;
}

/* Section */
.section {
  padding: 120px 0;
  border-bottom: 1px solid var(--line);
  position: relative;
}

.section-head {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 80px;
  margin-bottom: 64px;
  align-items: end;
}
@media (max-width: 880px) {
  .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 48px; }
}

.section-head h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(36px, 5vw, 64px);
  line-height: 1.0;
  letter-spacing: -0.02em;
  text-wrap: balance;
}
.section-head h2 em { font-style: italic; color: var(--fg-2); }
.section-head p {
  font-size: 16px;
  line-height: 1.6;
  color: var(--fg-2);
  max-width: 460px;
  text-wrap: pretty;
}

/* Service cards */
.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
@media (max-width: 880px) { .services-grid { grid-template-columns: 1fr; } }

.svc-card {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 36px 32px 32px;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 320px;
  transition: background .25s ease;
}
.svc-card:hover { background: var(--bg-2); }
.svc-card .idx {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--fg-3);
}
.svc-card h3 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 26px;
  line-height: 1.1;
  letter-spacing: -0.01em;
}
.svc-card p {
  font-size: 14px;
  line-height: 1.55;
  color: var(--fg-2);
}
.svc-card .glyph {
  width: 56px; height: 56px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 4px;
  margin-top: auto;
  align-self: flex-start;
}
.svc-card .tag {
  position: absolute;
  top: 32px;
  right: 32px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg-3);
  letter-spacing: 0.04em;
}

/* Cases */
.cases {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
}
@media (max-width: 880px) { .cases { grid-template-columns: 1fr; } }

.case {
  padding: 48px 32px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.case:last-child { border-right: none; }
@media (max-width: 880px) {
  .case:last-child { border-right: 1px solid var(--line); }
}

.case .stat {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(72px, 9vw, 120px);
  line-height: 0.9;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.case .stat .unit {
  font-size: 0.35em;
  font-family: var(--mono);
  font-style: normal;
  color: var(--fg-2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-left: 4px;
}
.case .stat .sign {
  font-size: 0.5em;
  color: var(--fg-2);
}
.case .desc {
  font-size: 15px;
  line-height: 1.5;
  color: var(--fg);
  text-wrap: pretty;
}
.case .who {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
  text-transform: uppercase;
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
}

/* Contact */
.contact {
  padding: 140px 0 120px;
  position: relative;
  border-bottom: 1px solid var(--line);
}
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}
@media (max-width: 880px) {
  .contact-grid { grid-template-columns: 1fr; gap: 48px; }
}

.contact h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(40px, 6vw, 80px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  text-wrap: balance;
}
.contact h2 em { font-style: italic; color: var(--fg-2); }

.contact p.note {
  margin-top: 24px;
  font-size: 16px;
  color: var(--fg-2);
  max-width: 420px;
  line-height: 1.6;
}

.contact-meta {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--fg-2);
}
.contact-meta div { display: flex; gap: 12px; }
.contact-meta .k { color: var(--fg-3); width: 84px; }

/* Form */
.form {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 36px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  position: relative;
}
.form::before {
  content: "FORM-001 / DIAGNÓSTICO";
  position: absolute;
  top: 12px;
  right: 14px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--fg-3);
}

.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
}
.field input, .field textarea, .field select {
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--line);
  padding: 8px 0;
  font-size: 15px;
  outline: none;
  color: var(--fg);
  transition: border-color .2s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-bottom-color: var(--fg);
}
.field textarea { resize: vertical; min-height: 80px; }

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
@media (max-width: 560px) {
  .field-row { grid-template-columns: 1fr; }
}

.form button[type="submit"] {
  margin-top: 8px;
  align-self: flex-start;
}

.form-success {
  text-align: center;
  padding: 40px 20px;
  font-family: var(--serif);
  font-size: 28px;
  line-height: 1.2;
  color: var(--fg);
}
.form-success em { color: var(--fg-2); font-style: italic; }
.form-success .check {
  width: 40px; height: 40px;
  margin: 0 auto 16px;
  border: 1px solid var(--fg);
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-family: var(--mono);
}

/* Footer */
.footer {
  padding: 64px 0 40px;
  position: relative;
}
.footer-row {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 32px;
  flex-wrap: wrap;
}
.footer-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-3);
  letter-spacing: 0.04em;
}
.footer-big {
  font-family: var(--serif);
  font-size: clamp(64px, 12vw, 180px);
  line-height: 0.85;
  letter-spacing: -0.04em;
  margin-top: 32px;
  color: var(--fg);
}
.footer-big em { font-style: italic; color: var(--fg-2); }

/* Crosshairs / corner marks */
.corner-marks {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.corner-marks span {
  position: absolute;
  width: 8px; height: 8px;
  border-color: var(--line);
  border-style: solid;
  border-width: 0;
}
.corner-marks span.tl { top: 16px; left: 16px; border-top-width: 1px; border-left-width: 1px; }
.corner-marks span.tr { top: 16px; right: 16px; border-top-width: 1px; border-right-width: 1px; }
.corner-marks span.bl { bottom: 16px; left: 16px; border-bottom-width: 1px; border-left-width: 1px; }
.corner-marks span.br { bottom: 16px; right: 16px; border-bottom-width: 1px; border-right-width: 1px; }

/* Marquee for ticker */
.ticker {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  overflow: hidden;
  white-space: nowrap;
  padding: 16px 0;
}
.ticker-track {
  display: inline-flex;
  gap: 48px;
  animation: marquee 40s linear infinite;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--fg-2);
  letter-spacing: 0.04em;
}
.ticker-track span.dot {
  color: var(--fg-3);
}
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Blueprint diagram (hero B) */
.blueprint {
  position: relative;
  aspect-ratio: 1 / 1;
  border: 1px solid var(--line);
  background:
    linear-gradient(to right, var(--line-2) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line-2) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: -1px -1px;
}
.blueprint .label {
  position: absolute;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
}
.blueprint .corner-mark {
  position: absolute;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--fg-3);
}
.blueprint .axis-x, .blueprint .axis-y {
  position: absolute;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--fg-3);
}

/* Node */
.node {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--fg);
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.02em;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  z-index: 2;
}
.node .pulse {
  width: 7px; height: 7px;
  background: #4ade80;
  border-radius: 50%;
  position: relative;
}
.node .pulse::after {
  content: "";
  position: absolute;
  inset: -3px;
  border: 1px solid #4ade80;
  border-radius: 50%;
  animation: pulse-ring 2s ease-out infinite;
  opacity: 0;
}
@keyframes pulse-ring {
  0% { transform: scale(0.7); opacity: 1; }
  100% { transform: scale(2.2); opacity: 0; }
}

.node-center {
  background: var(--fg);
  color: var(--bg);
  font-size: 11px;
  padding: 12px 16px;
  z-index: 3;
}
.node-center .pulse { background: var(--bg); }

/* Hero C — Terminal */
.terminal {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 24px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  position: relative;
  overflow: hidden;
}
.terminal::before {
  content: "AS://core/agent-01.log";
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 10px;
  color: var(--fg-3);
  letter-spacing: 0.04em;
}
.terminal .row {
  display: flex;
  gap: 14px;
  align-items: baseline;
}
.terminal .ts { color: var(--fg-3); }
.terminal .ok { color: #16a34a; }
.terminal .warn { color: #ca8a04; }
.terminal .lbl { color: var(--fg-3); }
.terminal .v { color: var(--fg); }
[data-theme="dark"] .terminal .ok { color: #4ade80; }
[data-theme="dark"] .terminal .warn { color: #facc15; }

.terminal .bar {
  flex: 1;
  height: 4px;
  background: var(--line);
  position: relative;
  overflow: hidden;
}
.terminal .bar i {
  display: block;
  position: absolute;
  inset: 0;
  background: var(--fg);
  transform-origin: left;
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ── Counter (live ticking number) ───────────────────────────────────────────
function Counter({ to, duration = 1400, decimals = 0, suffix = "" }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let started = false;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          const t0 = performance.now();
          const tick = (t) => {
            const p = Math.min(1, (t - t0) / duration);
            const eased = 1 - Math.pow(1 - p, 3);
            setV(eased * to);
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [to, duration]);
  return <span ref={ref}>{v.toFixed(decimals)}{suffix}</span>;
}

function CounterFloat({ to, decimals = 0 }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let started = false;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          const t0 = performance.now();
          const dur = 1600;
          const tick = (t) => {
            const p = Math.min(1, (t - t0) / dur);
            const eased = 1 - Math.pow(1 - p, 3);
            setV(eased * to);
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [to]);
  return <span ref={ref}>{v.toFixed(decimals)}</span>;
}
